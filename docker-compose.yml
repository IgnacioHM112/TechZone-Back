version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: techzone_db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      TZ: 'America/Argentina/Buenos_Aires'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
